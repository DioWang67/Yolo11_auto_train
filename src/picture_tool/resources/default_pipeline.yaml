anomaly_detection:
  input_formats:
  - .png
  - .jpg
  - .jpeg
  output_folder: ./data/project/processed/anomaly_results
  reference_folder: ./data/project/raw/good
  test_folder: ./data/project/raw/test
  threshold: 50
format_conversion:
  input_dir: ./data/project/raw/images
  input_formats:
  - .bmp
  output_dir: ./data/project/processed/images_converted
  output_format: .png
  quality: 95
image_augmentation:
  augmentation:
    num_images: 50
    num_operations:
    - 2
    - 4
    operations:
      blur:
        kernel:
        - 1
        - 3
      contrast:
        range:
        - 0.95
        - 1.05
      flip:
        probability: 0
      hue:
        range:
        - -5
        - 5
      multiply:
        range:
        - 0.95
        - 1.05
      noise:
        scale:
        - 1
        - 3
      perspective:
        scale:
        - 0.01
        - 0.02
      rotate:
        angle:
        - 0
        - 1
      scale:
        range:
        - 0.95
        - 1.05
  input:
    image_dir: ./data/project/raw/images
  output:
    image_dir: ./data/project/processed/augmented_preview
  processing:
    num_workers: 2
pipeline:
  log_file: logs/pipeline.log
  task_groups:
    augmentation:
      - yolo_augmentation
      - image_augmentation
    quality:
      - dataset_lint
      - aug_preview
      - color_verification
      - color_inspection
    preprocess:
      - format_conversion
      - anomaly_detection
    split:
      - dataset_splitter
    train:
      - yolo_train
      - yolo_evaluation
      - generate_report
    inference:
      - batch_inference
    full:
      - format_conversion
      - yolo_augmentation
      - image_augmentation
      - dataset_splitter
      - yolo_train
      - yolo_evaluation
      - generate_report
      - batch_inference
  tasks:
  - dependencies: []
    enabled: true
    name: format_conversion
  - dependencies: []
    enabled: true
    name: image_augmentation
  - dependencies: []
    enabled: true
    name: anomaly_detection
  - dependencies: []
    enabled: true
    name: yolo_augmentation
  - dependencies: []
    enabled: true
    name: dataset_splitter
  - dependencies: []
    enabled: true
    name: dataset_lint
  - dependencies: []
    enabled: true
    name: aug_preview
  - dependencies: []
    enabled: true
    name: color_verification
  - dependencies:
    - dataset_splitter
    enabled: true
    name: yolo_train
  - dependencies:
    - yolo_train
    enabled: true
    name: yolo_evaluation
  - dependencies:
    - yolo_evaluation
    enabled: true
    name: generate_report
  - dependencies: []
    enabled: true
    name: color_inspection
  - dependencies: []
    enabled: true
    name: batch_inference
train_test_split:
  input:
    image_dir: ./data/project/processed/images
    label_dir: ./data/project/processed/labels
  input_formats:
  - .png
  - .jpg
  - .jpeg
  label_format: .txt
  output:
    output_dir: ./data/project/split
  split_ratios:
    test: 0.15
    train: 0.7
    val: 0.15
  stratified: true
yolo_augmentation:
  augmentation:
    num_images: 50
    num_operations:
    - 2
    - 3
    operations:
      blur:
        kernel:
        - 0
        - 1
      contrast:
        range:
        - 0.92
        - 1.08
      flip:
        probability: 0.0
      hue:
        range:
        - 1
        - 1
      multiply:
        range:
        - 0.88
        - 1.15
      noise:
        scale:
        - 0
        - 6
      perspective:
        scale:
        - 0.0
        - 0.0
      rotate:
        angle:
        - -2
        - 2
      scale:
        range:
        - 0.97
        - 1.03
  input:
    image_dir: ./data/project/raw/images
    label_dir: ./data/project/raw/labels
  output:
    image_dir: ./data/project/processed/images
    label_dir: ./data/project/processed/labels
  processing:
    num_workers: 2

# YOLO training settings
yolo_training:
  # Split dataset root containing train/val/test
  dataset_dir: ./data/project/split
  # Class names for your dataset
  class_names: ["Object1", "Object2"]
  # Initial weights (local file or model name)
  model: ./models/yolo11n.pt
  # Training hyperparameters
  epochs: 50
  imgsz: 640
  batch: 16
  device: cpu
  # Ultralytics outputs
  project: ./runs/project
  name: train
  position_validation:
    enabled: false
    product: null
    area: null
    imgsz: 640
    sample_dir: null
    config_path: ./models/yolo/position_config.yaml
    config: {}
    output_dir: ./runs/project/quality/position
    weights: null
    device: null
    conf: 0.25
    tolerance_override: null
    auto_generate: true
  export_detection_config:
    enabled: true
    output_path: null  # default to run directory when null
    weights_name: best.pt
    device: null  # fallback to training device
    conf_thres: 0.4
    iou_thres: 0.45
    imgsz: null  # fallback to training imgsz
    timeout: 1
    enable_yolo: true
    output_dir: Result
    current_product: null
    area: null
    expected_items: {}

    tolerance: null
    tolerance_unit: percent
    position_config_path: null  # fallback to position_validation.config_path
    position_config: {}
    include_all_products: false

  export_onnx:
    enabled: true
    weights_name: best.pt
    imgsz: null  # fallback to training imgsz
    device: null  # fallback to training device
    half: false
    dynamic: false
    simplify: false
    opset: null
  artifact_bundle:
    enabled: true
    dir_name: bundle
    base_dir: null  # defaults to run directory
    include_weights: true
    include_detection_config: true
    include_position_config: true
    include_onnx: true
    include_results_csv: true
    include_args_yaml: true

# YOLO evaluation settings
yolo_evaluation:
  # If null, uses best.pt from training run
  weights: null
  imgsz: 640
  device: cpu

# Batch inference settings
batch_inference:
  input_dir: ./data/project/split/test/images
  output_dir: ./runs/project/infer
  weights: null
  imgsz: 640
  device: cpu
  conf: 0.25

# Report generation
report:
  output_dir: ./runs/project/reports
  include_artifacts: true

# Dataset lint and preview settings
dataset_lint:
  image_dir: ./data/project/processed/images
  label_dir: ./data/project/processed/labels
  output_dir: ./runs/project/quality/lint
  num_preview: 20
  preview_cols: 5
  seed: 42

aug_preview:
  image_dir: ./data/project/processed/images
  label_dir: ./data/project/processed/labels
  output_dir: ./runs/project/quality/preview
  num_samples: 16
  cols: 4
  seed: 42


color_inspection:
  enabled: true
  input_dir: ./data/project/qc/color_samples
  output_json: ./runs/project/quality/color/stats.json
  colors:
    - Object1
    - Object2
  sam:
    checkpoint: ./models/sam2_b.pt
    model_type: sam2_b
    device: auto

# 改進版顏色驗證配置
color_verification:
  enabled: true
  input_dir: ./data/project/qc/color_samples
  color_stats: ./runs/project/quality/color/stats.json
  output_json: ./runs/project/quality/color/verification.json
  output_csv: ./runs/project/quality/color/verification.csv
  recursive: true
  expected_from_name: true
  expected_map: null

  hsv_margin: [8, 30, 30]
  lab_margin: [10, 8, 10]

  # 視覺化除錯
  debug_plot: true
  debug_dir: ./runs/project/quality/color/debug
  
  # 條帶採樣配置 (Strip Sampling)
  strip_sampling:
    enabled: true
    segments: 10
    orientation: vertical
    min_width_ratio: 0.06
    threshold: 0.30
    edge_margin: 0.15
    sat_threshold: 30
    val_threshold: 200
    center_bias: true
    center_sigma: 0.25
    min_valid_pixels: 60
    top_k: 3
    min_sat_ratio: 0.15
    max_edge_ratio: 0.25
